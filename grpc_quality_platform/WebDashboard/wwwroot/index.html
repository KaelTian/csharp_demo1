<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能质量检测平台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #1e293b;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .status {
            font-size: 13px;
            color: #94a3b8;
        }

        .header .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* Summary Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .card .sub {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .card.primary .value {
            color: #38bdf8;
        }
        .card.success .value {
            color: #22c55e;
        }
        .card.danger .value {
            color: #ef4444;
        }
        .card.warning .value {
            color: #f59e0b;
        }
        .card.info .value {
            color: #a78bfa;
        }

        /* Charts */
        .charts {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .chart-box {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }

        .chart-box h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chart-box canvas {
            max-height: 280px;
        }

        /* Charts Row 2 */
        .charts-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        /* Alerts */
        .alerts {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }

        .alerts h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .alert-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
            animation: slideIn 0.3s ease;
        }

        .alert-item:last-child {
            border-bottom: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .alert-item .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 12px;
            min-width: 60px;
            text-align: center;
        }

        .badge.CRITICAL {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .badge.WARNING {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        .badge.INFO {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
        }

        .alert-item .msg {
            flex: 1;
            font-size: 14px;
        }

        .alert-item .time {
            font-size: 12px;
            color: #64748b;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .charts {
                grid-template-columns: 1fr;
            }
            .charts-2 {
                grid-template-columns: 1fr;
            }
            .cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏭 智能质量检测平台</h1>
        <div class="status">
            <span class="dot"></span>
            <span id="lastUpdate">实时更新</span>
        </div>
    </div>

    <!-- Summary Cards -->
    <div class="cards" id="summaryCards">
        <div class="card primary">
            <div class="label">总检测数</div>
            <div class="value" id="totalProducts">-</div>
            <div class="sub">累计产品</div>
        </div>
        <div class="card success">
            <div class="label">通过率</div>
            <div class="value" id="passRate">-</div>
            <div class="sub">良品率</div>
        </div>
        <div class="card info">
            <div class="label">平均质量分</div>
            <div class="value" id="avgScore">-</div>
            <div class="sub">0-100 分</div>
        </div>
        <div class="card danger">
            <div class="label">活跃告警</div>
            <div class="value" id="activeAlerts">-</div>
            <div class="sub">待处理</div>
        </div>
        <div class="card warning">
            <div class="label">主要缺陷</div>
            <div class="value" id="topDefect">-</div>
            <div class="sub">最高频问题</div>
        </div>
    </div>

    <!-- Charts Row 1 -->
    <div class="charts">
        <div class="chart-box">
            <h3>📈 质量趋势</h3>
            <canvas id="trendChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>🥧 缺陷分布</h3>
            <canvas id="defectChart"></canvas>
        </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="charts-2">
        <div class="chart-box">
            <h3>📊 产线通过率</h3>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="alerts">
            <h3>🔔 实时告警</h3>
            <div id="alertsContainer">
                <div class="empty-state">
                    <div class="icon">✅</div>
                    <div>暂无告警</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Charts
        let trendChart, defectChart, lineChart;

        function initCharts(data) {
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            const trendLabels = Object.keys(data.scoreTrend || {});
            const trendValues = Object.values(data.scoreTrend || {});
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: trendLabels,
                    datasets: [{
                        label: '质量分',
                        data: trendValues,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#1e293b' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            const defectCtx = document.getElementById('defectChart').getContext('2d');
            if (defectChart) defectChart.destroy();
            const defectLabels = Object.keys(data.defectDistribution || {});
            const defectValues = Object.values(data.defectDistribution || {});
            const colors = ['#ef4444', '#f59e0b', '#22c55e', '#38bdf8', '#a78bfa', '#ec4899'];
            defectChart = new Chart(defectCtx, {
                type: 'doughnut',
                data: {
                    labels: defectLabels.length ? defectLabels : ['无缺陷'],
                    datasets: [{
                        data: defectLabels.length ? defectValues : [1],
                        backgroundColor: defectLabels.length ? colors.slice(0, defectLabels.length) : ['#334155'],
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { size: 11 } }
                        }
                    }
                }
            });

            const lineCtx = document.getElementById('lineChart').getContext('2d');
            if (lineChart) lineChart.destroy();
            const lineLabels = Object.keys(data.lineStats || {});
            const lineValues = Object.values(data.lineStats || {});
            lineChart = new Chart(lineCtx, {
                type: 'bar',
                data: {
                    labels: lineLabels.length ? lineLabels : ['暂无数据'],
                    datasets: [{
                        label: '通过率 %',
                        data: lineValues.length ? lineValues : [0],
                        backgroundColor: lineValues.map(v =>
                            v >= 90 ? '#22c55e' : v >= 70 ? '#f59e0b' : '#ef4444'
                        ),
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#1e293b' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function updateCards(data) {
            document.getElementById('totalProducts').textContent = data.totalProducts || 0;
            document.getElementById('passRate').textContent = (data.passRate || 0) + '%';
            document.getElementById('avgScore').textContent = (data.avgQualityScore || 0).toFixed(1);
            document.getElementById('activeAlerts').textContent = data.activeAlerts || 0;
            document.getElementById('topDefect').textContent = data.topDefectType || '无';
            document.getElementById('lastUpdate').textContent =
                '更新于 ' + new Date().toLocaleTimeString();
        }

        function renderAlerts(alerts) {
            const container = document.getElementById('alertsContainer');
            if (!alerts || alerts.length === 0) {
                container.innerHTML =
                    `<div class="empty-state"><div class="icon">✅</div><div>暂无告警</div></div>`;
                return;
            }

            container.innerHTML = alerts.slice(0, 8).map(a => {
                const time = new Date((a.createdAt || 0) * 1000).toLocaleTimeString();
                return `
                    <div class="alert-item">
                        <span class="badge ${a.severity}">${a.severity}</span>
                        <span class="msg">${a.message || '未知告警'}</span>
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');
        }

        // Add new alert to the top of the list
        function addAlert(alert) {
            const container = document.getElementById('alertsContainer');
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) container.innerHTML = '';

            const time = new Date((alert.createdAt || 0) * 1000).toLocaleTimeString();
            const el = document.createElement('div');
            el.className = 'alert-item';
            el.innerHTML = `
                <span class="badge ${alert.severity}">${alert.severity}</span>
                <span class="msg">${alert.message || '未知告警'}</span>
                <span class="time">${time}</span>
            `;
            container.prepend(el);

            // Keep max 20
            while (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }

        // Fetch dashboard
        async function fetchDashboard() {
            try {
                const resp = await fetch('/api/dashboard');
                const data = await resp.json();
                updateCards(data);
                initCharts(data);
                renderAlerts(data.recentAlerts || []);
            } catch (err) {
                console.error('Dashboard fetch error:', err);
            }
        }

        // SSE - alerts stream
        function connectAlertsStream() {
            const evtSource = new EventSource('/api/alerts/stream');
            evtSource.onmessage = function(event) {
                try {
                    const alert = JSON.parse(event.data);
                    addAlert(alert);

                    // Update alert count
                    const countEl = document.getElementById('activeAlerts');
                    countEl.textContent = parseInt(countEl.textContent || '0') + 1;
                } catch (e) {
                    console.error('SSE parse error:', e);
                }
            };
            evtSource.onerror = function() {
                console.log('SSE disconnected, reconnecting...');
                evtSource.close();
                setTimeout(connectAlertsStream, 3000);
            };
        }

        // Poll every 10s for dashboard refresh
        setInterval(fetchDashboard, 10000);

        // Initial load
        fetchDashboard();
        connectAlertsStream();
    </script>

</body>
</html>
